# KNG7: first_cheap_03 — one process can trade BTC 5m and 15m together via BOT_WINDOW_MINUTES=5,15
# (same btc50_1c rules per lane). Copy .env.example -> .env
services:
  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./exports:/app/exports
