# KNG7: limit_pair_5m — scheduled dual limits on upcoming 5m windows. Copy .env.example -> .env
services:
  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./exports:/app/exports
      # Writable state (appuser); survives restarts even if host ./exports is root-owned.
      - bot_data:/app/data

volumes:
  bot_data:
